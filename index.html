<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Perfect Tailor</title>
  <link rel="stylesheet" href="style.css">

  <!-- Premium Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- HERO -->
<header>
  <div class="overlay">
    <h1>Perfect Tailor</h1>
    <p>Luxury Tailoring. Precision Fit.</p>
    <button onclick="scrollToBooking()">Book Appointment</button>
  </div>
</header>

<!-- SERVICES -->
<section class="services">
  <h2>Our Expertise</h2>
  <div class="cards">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1593032465171-8f0b1c6f3b3c">
      <h3>Custom Stitching</h3>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1520975922284-9d1b9c1cdbf2">
      <h3>Perfect Measurements</h3>
    </div>
    <div class="card">
      <img src="https://images.unsplash.com/photo-1542060748-10c28b62716f">
      <h3>Premium Fabric</h3>
    </div>
  </div>
</section>

<!-- BOOKING -->
<section id="booking">
  <h2>Book a Home Visit</h2>

  <form onsubmit="sendToWhatsApp(event)">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="text" id="phone" placeholder="Phone Number" required>
    <input type="text" id="address" placeholder="Address" required>
    <input type="date" id="date" required>
    <input type="time" id="time" required>

    <button type="submit">Confirm Booking</button>
  </form>
</section>

<script src="script.js"></script>
</body>
</html>
