<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Perfect Tailor</title>
  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- HERO -->
<header>
  <div class="overlay">
    <h1>Perfect Tailor</h1>
    <p>Luxury Tailoring at Your Doorstep</p>
    <button onclick="scrollToBooking()">Book Appointment</button>
  </div>
</header>

<!-- CLOTHING SECTION -->
<section class="gallery">
  <h2>Our Craft</h2>
  <div class="images">
    <img src="https://images.unsplash.com/photo-1521335629791-ce4aec67dd53" />
    <img src="https://images.unsplash.com/photo-1593032465171-8f0b1c6f3b3c" />
    <img src="https://images.unsplash.com/photo-1542060748-10c28b62716f" />
  </div>
</section>

<!-- BOOKING -->
<section id="booking">
  <h2>Book a Home Visit</h2>

  <form onsubmit="sendToWhatsApp(event)">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="text" id="phone" placeholder="Phone Number" required>
    <input type="text" id="address" placeholder="Address" required>
    <input type="date" id="date" required>
    <input type="time" id="time" required>

    <button type="submit">Confirm Booking</button>
  </form>
</section>

<script src="script.js"></script>

</body>
</html>
